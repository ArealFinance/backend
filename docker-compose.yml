# Local-dev infrastructure for the Areal backend.
#
# Brings up just the persistent stores (Postgres + Redis); the Nest.js process
# itself runs locally via `npm run start:dev` so editor + debugger workflows
# stay snappy. For a containerised run use `docker-compose.prod.template.yml`.
#
# All ports bind to 127.0.0.1 — never expose dev DBs on 0.0.0.0.

services:
  postgres:
    image: postgres:15-alpine
    container_name: areal-backend-postgres
    restart: unless-stopped
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_DB: areal
      POSTGRES_USER: areal
      POSTGRES_PASSWORD: dev-only-change-me
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U areal -d areal']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: areal-backend-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
